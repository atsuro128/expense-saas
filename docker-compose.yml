services:
  # -----------------------------------------------------------------------
  # PostgreSQL（メイン DB / ローカル開発用）
  # -----------------------------------------------------------------------
  db:
    image: postgres:16
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-expense_owner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      POSTGRES_DB: ${POSTGRES_DB:-expense_saas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-expense_owner} -d ${POSTGRES_DB:-expense_saas}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # -----------------------------------------------------------------------
  # PostgreSQL（テスト専用 DB）
  # -----------------------------------------------------------------------
  db-test:
    image: postgres:16
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: expense_test
    volumes:
      - ./scripts/init-db-test.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d expense_test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # -----------------------------------------------------------------------
  # マイグレーション（init コンテナ方式）
  # db が healthy になった後に 000001〜000011 の SQL を順番に適用して終了する。
  # api サービスはこのコンテナの完了を待ってから起動する。
  # -----------------------------------------------------------------------
  migrate:
    image: migrate/migrate:v4.17.0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./db/migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER:-expense_owner}:${POSTGRES_PASSWORD:-localdev}@db:5432/${POSTGRES_DB:-expense_saas}?sslmode=disable"
      - "up"
    restart: on-failure

  # -----------------------------------------------------------------------
  # MinIO（S3 互換オブジェクトストレージ、ADR-0004 ローカル構成方針）
  # ポート 9000: S3 API / ポート 9001: MinIO コンソール
  # -----------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # -----------------------------------------------------------------------
  # MinIO 初期バケット作成（mc サイドカー、ワンショット実行）
  # minio が healthy になった後にバケット expense-saas-receipts-dev を作成して終了する。
  # -----------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/expense-saas-receipts-dev &&
        echo 'バケット expense-saas-receipts-dev を作成しました'
      "

  # -----------------------------------------------------------------------
  # Seed（開発用フィクスチャ投入、ワンショット、profile で通常起動から除外）
  # `docker compose --profile seed run --rm seed` で実行する。
  # `docker compose up -d` 実行後に make seed を叩く運用を想定。
  # -----------------------------------------------------------------------
  seed:
    build: .
    profiles: [seed]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://expense_owner:localdev@db:5432/expense_saas?sslmode=disable}
      APP_DATABASE_URL: ${APP_DATABASE_URL:-postgres://expense_app:localdev@db:5432/expense_saas?sslmode=disable}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-expense-saas-receipts-dev}
      AWS_REGION: ${AWS_REGION:-ap-northeast-1}
    entrypoint: ["/app/seed"]
    restart: "no"

  # -----------------------------------------------------------------------
  # API サーバー（Go バックエンド）
  # migrate の完了と minio-init の完了を待ってから起動する。
  # minio-init が minio healthy を含意するため minio の直接待ちは不要。
  # -----------------------------------------------------------------------
  api:
    build: .
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://expense_owner:localdev@db:5432/expense_saas?sslmode=disable}
      APP_DATABASE_URL: ${APP_DATABASE_URL:-postgres://expense_app:localdev@db:5432/expense_saas?sslmode=disable}
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-/app/keys/private.pem}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/app/keys/public.pem}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      PORT: ${PORT:-8080}
      # S3 / MinIO 設定（env_config.md §4.4 参照）
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-expense-saas-receipts-dev}
      AWS_REGION: ${AWS_REGION:-ap-northeast-1}
    volumes:
      - ./keys:/app/keys:ro

  # -----------------------------------------------------------------------
  # フロントエンド（React / Vite 開発サーバー）
  # -----------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  minio_data:
