# ============================================================================
name: Deploy

on:
  push:
    branches: [master]

jobs:
  lint-backend:
    name: Lint (Backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest

  lint-frontend:
    name: Lint (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npx eslint src/

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

  test-backend:
    name: Test (Backend)
    needs: lint-backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: expense_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://testuser:testpass@localhost:5432/expense_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install golang-migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      - name: Run migrations
        run: migrate -path ./db/migrations -database "$TEST_DATABASE_URL" up

      - name: go test
        run: go test -tags integration -race ./...

  test-frontend:
    name: Test (Frontend)
    needs: lint-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        working-directory: frontend
        run: npm ci

      - name: vitest run
        working-directory: frontend
        run: npx vitest run

  build-backend:
    name: Build (Backend)
    needs: test-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: go build
        run: go build ./cmd/server

  build-frontend:
    name: Build (Frontend)
    needs: test-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        working-directory: frontend
        run: npm ci

      - name: npm run build
        working-directory: frontend
        run: npm run build

  # E2E テスト（Playwright）— E2E 環境整備後に if: false を削除して有効化
  e2e:
    name: E2E Tests (Playwright)
    if: false
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start E2E environment
        run: docker compose -f docker-compose.e2e.yml up -d

      - name: Wait for services
        run: npx wait-on http://localhost:8080/healthz --timeout 60000

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npx playwright test
        # 対象フロー（test_strategy.md § 10.2 参照）:
        #   - フロー1: 申請→承認→支払完了
        #   - フロー2: 申請→却下→再申請

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Stop E2E environment
        if: always()
        run: docker compose -f docker-compose.e2e.yml down

  # スモークテスト（レスポンスタイム閾値確認）— E2E 環境整備後に if: false を削除して有効化
  smoke:
    name: Smoke Tests (Response Time)
    if: false
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start E2E environment
        run: docker compose -f docker-compose.e2e.yml up -d

      - name: Wait for services
        run: npx wait-on http://localhost:8080/healthz --timeout 60000

      - name: Run response time smoke tests
        run: |
          # 閾値（test_strategy.md § 3.1 参照）:
          #   - API レスポンスタイム p95: 500ms 以下
          #   - ファイルアップロード（5MB）: 5 秒以下
          # テストケース定義: docs/60_test/cross-cutting.md
          echo "TODO: スモークテスト実装"
          exit 1

      - name: Stop E2E environment
        if: always()
        run: docker compose -f docker-compose.e2e.yml down

